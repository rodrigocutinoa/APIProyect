services:
  - type: web
    name: APIProyect
    env: python
    pythonVersion: 3.12.18
    region: oregon
    plan: free
    envVars:
      - key: CARGO_HOME
        value: /tmp/.cargo
      - key: RUSTUP_HOME
        value: /tmp/.rustup
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
